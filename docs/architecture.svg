<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/><stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="700" height="380" fill="#f8fafc" rx="12"/>
  <rect x="200" y="10" width="300" height="28" rx="8" fill="url(#hg)"/>
  <text x="350" y="29" text-anchor="middle" fill="white" font-size="12" font-weight="bold">mcp-test-runner — Architecture</text>

  <rect x="250" y="48" width="200" height="34" rx="8" fill="#059669"/>
  <text x="350" y="70" text-anchor="middle" fill="white" font-size="11" font-weight="bold">MCP Client</text>
  <line x1="350" y1="82" x2="350" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <rect x="125" y="110" width="450" height="85" rx="10" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="125" y="110" width="450" height="24" rx="10" fill="url(#hg)"/>
  <rect x="125" y="122" width="450" height="12" fill="url(#hg)"/>
  <text x="350" y="127" text-anchor="middle" fill="white" font-size="11" font-weight="bold">mcp-test-runner (7 tools)</text>

  <rect x="140" y="142" width="100" height="18" rx="4" fill="#eef2ff"/>
  <text x="190" y="155" text-anchor="middle" font-size="8" fill="#3730a3">run_unit_tests</text>
  <rect x="248" y="142" width="110" height="18" rx="4" fill="#eef2ff"/>
  <text x="303" y="155" text-anchor="middle" font-size="8" fill="#3730a3">run_integration</text>
  <rect x="366" y="142" width="100" height="18" rx="4" fill="#eef2ff"/>
  <text x="416" y="155" text-anchor="middle" font-size="8" fill="#3730a3">run_browser</text>
  <rect x="474" y="142" width="90" height="18" rx="4" fill="#eef2ff"/>
  <text x="519" y="155" text-anchor="middle" font-size="8" fill="#3730a3">run_targeted</text>

  <rect x="180" y="166" width="100" height="18" rx="4" fill="#f0fdf4"/>
  <text x="230" y="179" text-anchor="middle" font-size="8" fill="#166534">get_results</text>
  <rect x="290" y="166" width="110" height="18" rx="4" fill="#f0fdf4"/>
  <text x="345" y="179" text-anchor="middle" font-size="8" fill="#166534">get_coverage</text>
  <rect x="410" y="166" width="100" height="18" rx="4" fill="#f0fdf4"/>
  <text x="460" y="179" text-anchor="middle" font-size="8" fill="#166534">collect_logs</text>

  <text x="350" y="210" text-anchor="middle" font-size="10" fill="#64748b">Auto-detects framework ↓</text>

  <!-- Frameworks -->
  <rect x="60" y="225" width="110" height="55" rx="8" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <text x="115" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Cargo</text>
  <text x="115" y="265" text-anchor="middle" font-size="8" fill="#6b7280">cargo test</text>
  <text x="115" y="276" text-anchor="middle" font-size="7" fill="#6b7280">tarpaulin</text>

  <rect x="185" y="225" width="110" height="55" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <text x="240" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Jest</text>
  <text x="240" y="265" text-anchor="middle" font-size="8" fill="#6b7280">npx jest</text>
  <text x="240" y="276" text-anchor="middle" font-size="7" fill="#6b7280">c8 coverage</text>

  <rect x="310" y="225" width="110" height="55" rx="8" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="365" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">Pytest</text>
  <text x="365" y="265" text-anchor="middle" font-size="8" fill="#6b7280">pytest -x</text>
  <text x="365" y="276" text-anchor="middle" font-size="7" fill="#6b7280">coverage.py</text>

  <rect x="435" y="225" width="110" height="55" rx="8" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="490" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Go</text>
  <text x="490" y="265" text-anchor="middle" font-size="8" fill="#6b7280">go test ./...</text>
  <text x="490" y="276" text-anchor="middle" font-size="7" fill="#6b7280">coverprofile</text>

  <rect x="560" y="225" width="110" height="55" rx="8" fill="white" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="615" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">Playwright</text>
  <text x="615" y="265" text-anchor="middle" font-size="8" fill="#6b7280">npx playwright</text>
  <text x="615" y="276" text-anchor="middle" font-size="7" fill="#6b7280">E2E tests</text>

  <rect x="200" y="300" width="300" height="30" rx="6" fill="#f1f5f9" stroke="#64748b"/>
  <text x="350" y="320" text-anchor="middle" font-size="10" fill="#334155">Local Project Filesystem</text>

  <rect x="220" y="348" width="260" height="20" rx="10" fill="#4f46e5"/>
  <text x="350" y="362" text-anchor="middle" fill="white" font-size="9" font-weight="bold">7 Tools · Auto-detect · ADK-Rust Enterprise</text>

  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#64748b"/></marker></defs>
</svg>
